<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>1</title>
  <style>
    body {
      font-family: 'Cardo', serif;
      background: #121212;
      color: #eee;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      padding: 1rem;
      text-align: center;
    }
    input, button {
      font-family: 'Cardo', serif;
      font-size: 1rem;
      padding: 0.5rem 1rem;
      margin-top: 1rem;
      border-radius: 4px;
      border: 2px solid transparent;
    }
    input {
      width: 200px;
      text-align: center;
    }
    button {
      background-color: #0af;
      color: #121212;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.3s ease, color 0.3s ease, border 0.3s ease;
    }
    button:hover {
      background-color: transparent;
      color: #0af;
      border: 2px solid #0af;
    }
    .caption {
      font-style: italic;
      color: #bbb;
      font-size: 0.9rem;
    }
    .message {
      margin-top: 1rem;
      height: 1.5rem;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h2>1</h2>
  <p>one letter, two friends, more that 3 years of resonance...is it i?</p>
  <input type="text" id="answer" placeholder="resonate here" autocomplete="off" />
  <div class="caption">( think of yourself, maybe too literally. )</div>
  <button id="submit">resonate</button>
  <div class="message" id="message"></div>

  <script>
    const answer = document.getElementById('answer');
    const message = document.getElementById('message');
    const submit = document.getElementById('submit');

    submit.addEventListener('click', () => {
      const val = answer.value.trim().toLowerCase();
      if (val === 'i') {
        message.style.color = '#0f0';
        message.textContent = "das is sehr gut";
        setTimeout(() => {
          message.textContent = "happy birthday blud";
          setTimeout(() => {
            window.location.href = 'readthepoembro.html';
          }, 3000);
        }, 5000);
      } else {
        message.style.color = '#f44';
        message.textContent = 'it was i bro... it was so obvious *crying emoji*';
      }
    });

    answer.addEventListener('keydown', e => {
      if (e.key === 'Enter') submit.click();
    });
  </script>
</body>
</html>
